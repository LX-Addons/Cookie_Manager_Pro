# =============================================================================
# 共享环境变量配置参考文档
# =============================================================================
# ⚠️ 重要提示：此文件仅作为文档参考，GitHub Actions 不会自动读取它！
#
# 更新版本时，需要手动修改以下 2 个文件：
#   1. .github/workflows/build-and-check.yml
#   2. .github/workflows/dependency-review.yml
#
# 修改步骤：
#   1. 修改此文件记录新版本（作为文档）
#   2. 同步修改上述 2 个工作流文件的 env 部分
#   3. 提交并测试
# =============================================================================

# 依赖审查工具版本
LICENSE_CHECKER_VERSION: "4.4.2"

# Node.js 版本 - 所有工作流统一使用
NODE_VERSION: "24"

# pnpm 版本 - 所有工作流统一使用
PNPM_VERSION: "10.32.1"

# 扩展体积限制 (MB)
EXTENSION_SIZE_LIMIT_MB: "10"

# =============================================================================
# 需要同步修改的文件位置：
# =============================================================================
# build-and-check.yml (Line 36-39):
#   env:
#     NODE_VERSION: "24"
#     PNPM_VERSION: "10.32.1"
#     EXTENSION_SIZE_LIMIT_MB: 10
#
# dependency-review.yml (Line 17-20):
#   env:
#     PNPM_VERSION: "10.32.1"
#     NODE_VERSION: "24"
